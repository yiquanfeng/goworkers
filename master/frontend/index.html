<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>go workers</title>
  <link href="https://fonts.googleapis.com/css2?family=Source+Code+Pro:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body class="login-page">
  <div class="app-container">
    <header class="header">
      <span class="header-side">go workers</span>
      <h1 class="header-title">go workers</h1>
      <span class="header-side" style="text-align:right;">go workers</span>
    </header>

    <main class="login-main">
      <div class="login-side"></div>

      <div class="login-form-wrapper">
        <div id="feedback-msg" class="msg msg-error hidden"></div>

        <label class="form-label" for="identifier">username / email</label>
        <input
          id="identifier"
          class="input"
          type="text"
          placeholder="username or email"
        />

        <label class="form-label" for="password">password</label>
        <input
          id="password"
          class="input"
          type="password"
          placeholder="password"
        />

        <div class="btn-row">
          <button class="btn btn-primary" id="login-btn">login</button>
          <button class="btn btn-secondary" id="register-btn">register</button>
        </div>

        <div id="register-extra" class="register-extra hidden">
          <label class="form-label" for="reg-username">username</label>
          <input
            id="reg-username"
            class="input"
            type="text"
            placeholder="username"
          />
          <label class="form-label" for="reg-email">email</label>
          <input
            id="reg-email"
            class="input"
            type="email"
            placeholder="email"
          />
          <button class="btn btn-primary" id="submit-register-btn">submit register</button>
        </div>
      </div>

      <div class="login-side"></div>
    </main>
  </div>

  <script>
    const API = '';

    const loginBtn = document.getElementById('login-btn');
    const registerBtn = document.getElementById('register-btn');
    const submitRegisterBtn = document.getElementById('submit-register-btn');
    const registerExtra = document.getElementById('register-extra');
    const feedbackMsg = document.getElementById('feedback-msg');

    function showError(msg) {
      feedbackMsg.textContent = msg;
      feedbackMsg.className = 'msg msg-error';
    }
    function showSuccess(msg) {
      feedbackMsg.textContent = msg;
      feedbackMsg.className = 'msg msg-success';
    }
    function hideMsg() {
      feedbackMsg.className = 'msg msg-error hidden';
    }

    loginBtn.addEventListener('click', async () => {
      hideMsg();
      const identifier = document.getElementById('identifier').value.trim();
      const password = document.getElementById('password').value;

      if (!identifier || !password) {
        showError('please fill in all fields');
        return;
      }

      try {
        const res = await fetch(API + '/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ identifier, password }),
        });
        const data = await res.json();
        if (!res.ok) {
          showError(data.error || 'login failed');
          return;
        }
        localStorage.setItem('token', data.token);
        localStorage.setItem('username', data.user.username);
        window.location.href = '/static/dashboard.html';
      } catch (e) {
        showError('network error');
      }
    });

    registerBtn.addEventListener('click', () => {
      hideMsg();
      registerExtra.classList.toggle('hidden');
    });

    submitRegisterBtn.addEventListener('click', async () => {
      hideMsg();
      const username = document.getElementById('reg-username').value.trim();
      const email = document.getElementById('reg-email').value.trim();
      const password = document.getElementById('password').value;

      if (!username || !email || !password) {
        showError('please fill in all fields');
        return;
      }

      try {
        const res = await fetch(API + '/api/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, email, password }),
        });
        const data = await res.json();
        if (!res.ok) {
          showError(data.error || 'register failed');
          return;
        }
        showSuccess('[+] registered — please login.');
        registerExtra.classList.add('hidden');
      } catch (e) {
        showError('network error');
      }
    });
  </script>
</body>
</html>
